<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사장용 견적 확인</title>

<style>
body { font-family: sans-serif; padding: 20px; }
h1 { text-align: center; }
.box {
  border: 1px solid #ddd;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}
.total {
  font-size: 28px;
  font-weight: bold;
  color: red;
}
</style>
</head>

<body>

<h1>📊 사장용 견적 확인</h1>

<div class="box" id="summary">
선택값 없음
</div>

<div class="box total" id="total">
총 금액: 0만원
</div>

<script>
// 고객용과 동일 구조
const data = {
  type: "아파트",
  size: 30,
  work: "전체",
  paper: "실크",
  extras: {
    film: true,
    paint: false,
    floor: false,
    molding: true
  }
};

function calculate(){
  let price = 0;
  let text = "";

  // 집유형
  if(data.type === "원룸"){ price += 45; text += "원룸 45\n"; }
  if(data.type === "아파트"){ price += 100; text += "아파트 100\n"; }
  if(data.type === "빌라"){ price += 80; text += "빌라 80\n"; }

  // 평수
  if(data.size == 20){ price += 30; text += "20평 +30\n"; }
  if(data.size == 30){ price += 60; text += "30평 +60\n"; }

  // 벽지
  if(data.paper === "실크"){ price += 30; text += "실크 +30\n"; }

  // 옵션
  if(data.extras.film){ price += 50; text += "필름 +50\n"; }
  if(data.extras.molding){ price += 30; text += "몰딩 +30\n"; }

  document.getElementById("summary").innerText = text;
  document.getElementById("total").innerText = "총 금액: " + price + "만원";
}

calculate();
</script>

</body>
</html>
