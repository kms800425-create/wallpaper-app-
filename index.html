<h1>🔧 현장 견적 (사장용)</h1>

<div class="box">
  <label>평수</label>
  <input type="number" id="size" placeholder="예: 24">
</div>

<div class="box">
  <label>벽지 종류</label>
  <select id="wallpaper">
    <option value="8000">합지</option>
    <option value="12000">실크</option>
  </select>
</div>

<div class="box">
  <label>철거</label>
  <select id="remove">
    <option value="0">없음</option>
    <option value="50000">있음 (5만원)</option>
  </select>

  <label>퍼티</label>
  <select id="putty">
    <option value="0">없음</option>
    <option value="70000">있음 (7만원)</option>
  </select>

  <label>곰팡이</label>
  <select id="mold">
    <option value="0">없음</option>
    <option value="80000">있음 (8만원)</option>
  </select>
</div>

<div class="box">
  <h3>추가 인테리어</h3>

  <label><input type="checkbox" value="1500000" class="extra"> 싱크대 교체 (+150만)</label><br>
  <label><input type="checkbox" value="3000000" class="extra"> 샷시 교체 (+300만)</label><br>
  <label><input type="checkbox" value="2000000" class="extra"> 욕실 리모델링 (+200만)</label><br>
  <label><input type="checkbox" value="500000" class="extra"> 몰딩 교체 (+50만)</label><br>
  <label><input type="checkbox" value="300000" class="extra"> 필름 시공 (+30만)</label>
</div>

<button onclick="calc()">견적 계산</button>

<div class="result" id="result">0원</div>

<script>
function calc() {
  let size = Number(document.getElementById("size").value);
  let wallpaper = Number(document.getElementById("wallpaper").value);
  let remove = Number(document.getElementById("remove").value);
  let putty = Number(document.getElementById("putty").value);
  let mold = Number(document.getElementById("mold").value);

  // 도배 비용 (평수 × 3 = 대략 벽면)
  let area = size * 3;
  let cost = area * wallpaper;

  let extra = remove + putty + mold;

  // 추가 인테리어 합산
  let extras = document.querySelectorAll(".extra:checked");
  let extraCost = 0;
  extras.forEach(e => extraCost += Number(e.value));

  let total = cost + extra + extraCost + 200000; // 기본 인건비

  document.getElementById("result").innerText =
    total.toLocaleString() + "원";
}
</script>
