<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사장용 견적</title>

<style>
body { font-family: sans-serif; padding:20px; background:#f5f5f5; }
h1 { font-size:22px; }
.box { background:#fff; padding:15px; margin-bottom:15px; border-radius:10px; }
input, select { width:100%; padding:10px; margin-top:5px; margin-bottom:10px; }
button { width:100%; padding:15px; font-size:16px; background:#000; color:#fff; border:none; border-radius:10px; }
.result { font-size:24px; font-weight:bold; margin-top:10px; }
</style>

</head>
<body>

<h1>🔧 현장 견적 (사장용)</h1>

<div class="box">
<label>벽 길이 (m)</label>
<input type="number" id="width">

<label>천장 높이 (m)</label>
<input type="number" id="height">

<label>방 개수</label>
<input type="number" id="room">

<label>벽지 종류</label>
<select id="wallpaper">
<option value="8000">합지 (8,000원/㎡)</option>
<option value="12000">실크 (12,000원/㎡)</option>
</select>
</div>

<div class="box">
<label>철거</label>
<select id="remove">
<option value="0">없음</option>
<option value="50000">있음 (5만원)</option>
</select>

<label>퍼티</label>
<select id="putty">
<option value="0">없음</option>
<option value="70000">있음 (7만원)</option>
</select>

<label>곰팡이</label>
<select id="mold">
<option value="0">없음</option>
<option value="80000">있음 (8만원)</option>
</select>
</div>

<button onclick="calc()">견적 계산</button>

<div class="box">
<div>총 견적</div>
<div class="result" id="result">0원</div>
</div>

<script>
function calc() {
let w = document.getElementById("width").value;
let h = document.getElementById("height").value;
let r = document.getElementById("room").value;

let wallpaper = document.getElementById("wallpaper").value;
let remove = document.getElementById("remove").value;
let putty = document.getElementById("putty").value;
let mold = document.getElementById("mold").value;

let area = w * h * r;
let cost = area * wallpaper;

let extra = Number(remove) + Number(putty) + Number(mold);

let total = cost + extra + 200000; // 기본 인건비

document.getElementById("result").innerText =
total.toLocaleString() + "원";
}
</script>

</body>
</html>
