<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사장용 견적 계산기</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background: #f7f7f7;
      color: #222;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    .section {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    h2 {
      font-size: 18px;
      margin: 0 0 12px 0;
    }
    label {
      display: block;
      margin-top: 10px;
      font-size: 14px;
      font-weight: bold;
    }
    select, input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 15px;
    }
    .check-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    .check-item {
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
    }
    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: #222;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }
    .result {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin-top: 20px;
    }
    .price {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .profit {
      font-size: 22px;
      font-weight: bold;
      color: #c62828;
      margin-top: 10px;
    }
    .detail {
      font-size: 14px;
      line-height: 1.7;
      color: #555;
      margin-top: 10px;
      white-space: pre-line;
    }
  </style>
</head>
<body>

  <h1>📊 사장용 견적 계산기</h1>

  <div class="section">
    <h2>기본 정보</h2>

    <label>집 유형</label>
    <select id="type">
      <option value="">선택</option>
      <option value="원룸">원룸</option>
      <option value="빌라">빌라</option>
      <option value="아파트">아파트</option>
      <option value="상가">상가</option>
    </select>

    <label>평수</label>
    <select id="size">
      <option value="">선택</option>
      <option value="10">10평 이하</option>
      <option value="20">20평대</option>
      <option value="30">30평대</option>
      <option value="40">40평 이상</option>
    </select>

    <label>벽지 종류</label>
    <select id="paper">
      <option value="">선택</option>
      <option value="합지">합지</option>
      <option value="실크">실크</option>
    </select>

    <label>시공 범위</label>
    <select id="work">
      <option value="">선택</option>
      <option value="전체">전체 시공</option>
      <option value="부분">부분 시공</option>
      <option value="천장포함">천장 포함</option>
      <option value="기존벽지제거">기존 벽지 제거</option>
    </select>
  </div>

  <div class="section">
    <h2>추가 인테리어</h2>
    <div class="check-group">
      <label class="check-item"><input type="checkbox" id="film"> 필름</label>
      <label class="check-item"><input type="checkbox" id="paint"> 도색</label>
      <label class="check-item"><input type="checkbox" id="floor"> 장판</label>
      <label class="check-item"><input type="checkbox" id="molding"> 문/몰딩</label>
    </div>
  </div>

  <div class="section">
    <h2>원가 입력</h2>

    <label>자재비 (만원)</label>
    <input type="number" id="material" placeholder="예: 50">

    <label>인건비 (만원)</label>
    <input type="number" id="labor" placeholder="예: 60">

    <label>폐기물비 (만원)</label>
    <input type="number" id="waste" placeholder="예: 10">

    <label>기타비용 (만원)</label>
    <input type="number" id="etc" placeholder="예: 5">

    <label>추가 마진 (만원)</label>
    <input type="number" id="margin" placeholder="예: 20">
  </div>

  <button onclick="calculateEstimate()">사장용 견적 계산</button>

  <div class="result">
    <div class="price" id="customerPrice">고객 견적가: 0만원</div>
    <div class="profit" id="profit">예상 순이익: 0만원</div>
    <div class="detail" id="detail">입력 후 계산해주세요.</div>
  </div>

  <script>
    function getNumber(id) {
      return Number(document.getElementById(id).value) || 0;
    }

    function calculateEstimate() {
      const type = document.getElementById('type').value;
      const size = Number(document.getElementById('size').value);
      const paper = document.getElementById('paper').value;
      const work = document.getElementById('work').value;

      const film = document.getElementById('film').checked;
      const paint = document.getElementById('paint').checked;
      const floor = document.getElementById('floor').checked;
      const molding = document.getElementById('molding').checked;

      const material = getNumber('material');
      const labor = getNumber('labor');
      const waste = getNumber('waste');
      const etc = getNumber('etc');
      const margin = getNumber('margin');

      let basePrice = 0;
      let detailText = '';

      if (type === '원룸') {
        basePrice += 45;
        detailText += '원룸 기본: 45만원\n';
      } else if (type === '빌라') {
        basePrice += 80;
        detailText += '빌라 기본: 80만원\n';
      } else if (type === '아파트') {
        basePrice += 100;
        detailText += '아파트 기본: 100만원\n';
      } else if (type === '상가') {
        basePrice += 120;
        detailText += '상가 기본: 120만원\n';
      }

      if (size === 20) {
        basePrice += 30;
        detailText += '20평대 추가: 30만원\n';
      } else if (size === 30) {
        basePrice += 60;
        detailText += '30평대 추가: 60만원\n';
      } else if (size === 40) {
        basePrice += 90;
        detailText += '40평 이상 추가: 90만원\n';
      }

      if (paper === '실크') {
        basePrice += 30;
        detailText += '실크 벽지 추가: 30만원\n';
      } else if (paper === '합지') {
        detailText += '합지 벽지\n';
      }

      if (work === '부분') {
        basePrice -= 20;
        detailText += '부분 시공: -20만원\n';
      } else if (work === '천장포함') {
        basePrice += 20;
        detailText += '천장 포함: 20만원\n';
      } else if (work === '기존벽지제거') {
        basePrice += 15;
        detailText += '기존 벽지 제거: 15만원\n';
      } else if (work === '전체') {
        detailText += '전체 시공\n';
      }

      if (film) {
        basePrice += 50;
        detailText += '필름: 50만원\n';
      }
      if (paint) {
        basePrice += 40;
        detailText += '도색: 40만원\n';
      }
      if (floor) {
        basePrice += 60;
        detailText += '장판: 60만원\n';
      }
      if (molding) {
        basePrice += 30;
        detailText += '문/몰딩: 30만원\n';
      }

      const totalCost = material + labor + waste + etc;
      const customerPrice = basePrice + margin;
      const profit = customerPrice - totalCost;

      document.getElementById('customerPrice').innerText = `고객 견적가: ${customerPrice}만원`;
      document.getElementById('profit').innerText = `예상 순이익: ${profit}만원`;

      detailText += `\n원가 합계: ${totalCost}만원`;
      detailText += `\n추가 마진: ${margin}만원`;
      detailText += `\n최종 고객 견적가: ${customerPrice}만원`;
      detailText += `\n예상 순이익: ${profit}만원`;

      document.getElementById('detail').innerText = detailText;
    }
  </script>

</body>
</html>
