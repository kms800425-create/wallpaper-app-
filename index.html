<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>바른 수유 인테리어</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
        "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: #f3f3f3;
      color: #111;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px;
    }

    .top {
      background: #000;
      color: #fff;
      padding: 24px 20px;
      border-radius: 20px;
      margin-bottom: 16px;
    }

    .top h1 {
      margin: 0 0 10px 0;
      font-size: 24px;
      line-height: 1.3;
    }

    .top p {
      margin: 0;
      font-size: 16px;
      opacity: 0.95;
    }

    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .tab {
      flex: 1;
      border: none;
      border-radius: 16px;
      padding: 16px 12px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }

    .tab.active {
      background: #000;
      color: #fff;
    }

    .tab.inactive {
      background: #ddd;
      color: #111;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card h2 {
      margin: 0 0 8px 0;
      font-size: 20px;
    }

    .desc {
      margin: 0 0 18px 0;
      color: #666;
      font-size: 15px;
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 8px 0;
    }

    input,
    select {
      width: 100%;
      padding: 14px 16px;
      font-size: 17px;
      border: 1px solid #ddd;
      border-radius: 14px;
      background: #fff;
      margin-bottom: 18px;
    }

    .checkbox-group {
      display: grid;
      gap: 12px;
      margin-top: 8px;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
      line-height: 1.4;
    }

    .check-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin: 0;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      background: #000;
      color: #fff;
      padding: 16px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }

    .result-box {
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      margin-top: 16px;
    }

    .result-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .result-price {
      font-size: 34px;
      font-weight: 800;
      line-height: 1.2;
    }

    .sub-note {
      margin-top: 8px;
      color: #666;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>바른 수유 인테리어</h1>
      <p>고객용 간편 견적 + 사장용 현장 견적</p>
    </div>

    <div class="tabs">
      <button id="tabCustomer" class="tab active" onclick="showTab('customer')">고객용</button>
      <button id="tabBoss" class="tab inactive" onclick="showTab('boss')">사장용</button>
    </div>

    <!-- 고객용 -->
    <div id="customerSection">
      <div class="card">
        <h2>간편 견적</h2>
        <p class="desc">고객이 대략 금액을 빠르게 확인하는 용도예요.</p>

        <label for="customerSpace">공간 유형</label>
        <select id="customerSpace">
          <option value="450000">원룸</option>
          <option value="950000">24평</option>
          <option value="1350000">32평</option>
          <option value="1650000">37평</option>
        </select>

        <label for="customerWallpaper">벽지 종류</label>
        <select id="customerWallpaper">
          <option value="0">합지</option>
          <option value="150000">실크 (+15만)</option>
        </select>

        <label for="customerExtra">추가 작업</label>
        <select id="customerExtra">
          <option value="0">없음</option>
          <option value="100000">짐 이동 있음 (+10만)</option>
          <option value="180000">밑작업 필요 (+18만)</option>
        </select>

        <button class="btn" onclick="calcCustomer()">견적 보기</button>
      </div>

      <div class="result-box">
        <div class="result-title">예상 견적</div>
        <div class="result-price" id="customerResult">0원</div>
        <div class="sub-note">실측, 상태, 추가 공사 여부에 따라 달라질 수 있어요.</div>
      </div>
    </div>

    <!-- 사장용 -->
    <div id="bossSection" class="hidden">
      <div class="card">
        <h2>현장 견적</h2>
        <p class="desc">실측과 추가 공사 항목을 넣어 총 견적을 계산해요.</p>

        <label for="bossSize">평수</label>
        <input type="number" id="bossSize" placeholder="예: 24" />

        <label for="bossWallpaper">벽지 종류</label>
        <select id="bossWallpaper">
          <option value="8000">합지</option>
          <option value="12000">실크</option>
        </select>

        <label for="bossRemove">철거</label>
        <select id="bossRemove">
          <option value="0">없음</option>
          <option value="50000">있음 (+5만)</option>
        </select>

        <label for="bossPutty">퍼티</label>
        <select id="bossPutty">
          <option value="0">없음</option>
          <option value="70000">있음 (+7만)</option>
        </select>

        <label for="bossMold">곰팡이</label>
        <select id="bossMold">
          <option value="0">없음</option>
          <option value="80000">있음 (+8만)</option>
        </select>
      </div>

      <div class="card">
        <h2>추가 인테리어</h2>
        <p class="desc">총괄 인테리어에 들어갈 항목은 여기서 추가해요.</p>

        <div class="checkbox-group">
          <label class="check-item">
            <input type="checkbox" class="extraItem" value="1500000" />
            <span>싱크대 교체 (+150만)</span>
          </label>

          <label class="check-item">
            <input type="checkbox" class="extraItem" value="3000000" />
            <span>샷시 교체 (+300만)</span>
          </label>

          <label class="check-item">
            <input type="checkbox" class="extraItem" value="2000000" />
            <span>욕실 리모델링 (+200만)</span>
          </label>

          <label class="check-item">
            <input type="checkbox" class="extraItem" value="500000" />
            <span>몰딩 교체 (+50만)</span>
          </label>

          <label class="check-item">
            <input type="checkbox" class="extraItem" value="300000" />
            <span>필름 시공 (+30만)</span>
          </label>
        </div>
      </div>

      <button class="btn" onclick="calcBoss()">견적 계산</button>

      <div class="result-box">
        <div class="result-title">총 견적</div>
        <div class="result-price" id="bossResult">0원</div>
        <div class="sub-note">기본 인건비 20만 포함 기준</div>
      </div>
    </div>
  </div>

  <script>
    function showTab(type) {
      const customerSection = document.getElementById("customerSection");
      const bossSection = document.getElementById("bossSection");
      const tabCustomer = document.getElementById("tabCustomer");
      const tabBoss = document.getElementById("tabBoss");

      if (type === "customer") {
        customerSection.classList.remove("hidden");
        bossSection.classList.add("hidden");
        tabCustomer.className = "tab active";
        tabBoss.className = "tab inactive";
      } else {
        customerSection.classList.add("hidden");
        bossSection.classList.remove("hidden");
        tabCustomer.className = "tab inactive";
        tabBoss.className = "tab active";
      }
    }

    function calcCustomer() {
      const space = Number(document.getElementById("customerSpace").value);
      const wallpaper = Number(document.getElementById("customerWallpaper").value);
      const extra = Number(document.getElementById("customerExtra").value);

      const total = space + wallpaper + extra;
      document.getElementById("customerResult").innerText = total.toLocaleString() + "원";
    }

    function calcBoss() {
      const size = Number(document.getElementById("bossSize").value);
      const wallpaper = Number(document.getElementById("bossWallpaper").value);
      const remove = Number(document.getElementById("bossRemove").value);
      const putty = Number(document.getElementById("bossPutty").value);
      const mold = Number(document.getElementById("bossMold").value);

      const extras = document.querySelectorAll(".extraItem:checked");
      let extraInterior = 0;
      extras.forEach((item) => {
        extraInterior += Number(item.value);
      });

      const estimatedWallArea = size * 3;
      const wallpaperCost = estimatedWallArea * wallpaper;
      const optionCost = remove + putty + mold;
      const laborCost = 200000;

      const total = wallpaperCost + optionCost + extraInterior + laborCost;

      document.getElementById("bossResult").innerText = total.toLocaleString() + "원";
    }
  </script>
</body>
</html>
