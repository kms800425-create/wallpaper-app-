<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>바른 수유 인테리어</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #f3f3f3;
      color: #111;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px;
    }

    .top {
      background: #000;
      color: #fff;
      padding: 24px 20px;
      border-radius: 18px;
      margin-bottom: 16px;
    }

    .top h1 {
      margin: 0 0 10px 0;
      font-size: 28px;
      line-height: 1.2;
    }

    .top p {
      margin: 0;
      font-size: 16px;
      opacity: 0.95;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .tab-btn {
      border: none;
      border-radius: 14px;
      padding: 16px 12px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }

    .tab-btn.active {
      background: #000;
      color: #fff;
    }

    .tab-btn.inactive {
      background: #dddddd;
      color: #111;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 16px;
    }

    .section-title {
      margin: 0 0 8px 0;
      font-size: 18px;
      font-weight: 800;
    }

    .section-desc {
      margin: 0 0 18px 0;
      color: #666;
      font-size: 14px;
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
      margin-top: 14px;
    }

    input,
    select {
      width: 100%;
      padding: 14px 16px;
      font-size: 17px;
      border: 1px solid #ddd;
      border-radius: 12px;
      background: #f8f8f8;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: #999;
      background: #fff;
    }

    .check-list {
      display: grid;
      gap: 12px;
      margin-top: 8px;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
    }

    .check-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin: 0;
    }
