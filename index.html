<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바른수유 인테리어</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  background: #f4f5f7;
}

.wrap {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #fff;
  padding: 16px;
  border-radius: 16px;
  margin-bottom: 12px;
}

h2 { margin-bottom: 10px; }

select, input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  padding: 15px;
  border: none;
  background: #111;
  color: #fff;
  border-radius: 12px;
  font-size: 16px;
}

.hidden { display: none; }

.result {
  background: #fafafa;
  padding: 15px;
  border-radius: 12px;
}

.action a {
  display: block;
  margin-top: 10px;
  padding: 14px;
  text-align: center;
  border-radius: 12px;
  text-decoration: none;
}

.call { background: #111; color: #fff; }
.kakao { background: #FEE500; }
</style>
</head>

<body>
<div class="wrap">

<div class="card">
<h2>1. 주거형태 + 평수</h2>
<select id="houseSize">
<option value="">선택하세요</option>
<option>원룸 3평</option>
<option>원룸 5평</option>
<option>원룸 7평</option>
<option>아파트 20평</option>
<option>아파트 30평</option>
<option>아파트 34평</option>
<option>빌라 20평</option>
<option>상가 30평</option>
<option>사무실 20평</option>
</select>
</div>

<div class="card">
<h2>2. 벽지 선택</h2>
<select id="wall">
<option value="">선택</option>
<option>합지</option>
<option>실크</option>
</select>
</div>

<div class="card">
<h2>3. 추가 공사</h2>

<label>
<input type="checkbox" onclick="toggleOption()"> 추가 공사 있음
</label>

<div id="optionBox" class="hidden">

<label><input type="checkbox" value="장판"> 장판</label><br>
<label><input type="checkbox" value="필름"> 필름</label><br>
<label><input type="checkbox" value="타일"> 타일</label><br>
<label><input type="checkbox" value="싱크대"> 싱크대</label><br>
<label><input type="checkbox" value="샷시"> 샷시</label><br>

<input type="text" id="customOption" placeholder="기타 입력">

</div>
</div>

<div class="card">
<h2>4. 지역 선택</h2>

<select id="gu" onchange="updateDong()">
<option value="">구 선택</option>
<option value="강북구">강북구</option>
<option value="도봉구">도봉구</option>
<option value="성북구">성북구</option>
<option value="노원구">노원구</option>
</select>

<select id="dong">
<option>동 선택</option>
</select>

</div>

<div class="card">
<button onclick="calculate()">견적 보기</button>
</div>

<div class="card hidden" id="resultBox">
<div class="result" id="resultText"></div>

<div class="action">
<a class="call" href="tel:01040084197">전화 상담</a>
<a class="kakao" href="https://open.kakao.com/o/s9MsLsqi">카톡 상담</a>
</div>

</div>

</div>

<script>

const SCRIPT_URL = "여기 너 구글시트 주소";

function toggleOption() {
  document.getElementById("optionBox").classList.toggle("hidden");
}

function updateDong() {
  const gu = document.getElementById("gu").value;
  const dong = document.getElementById("dong");

  let list = [];

  if (gu === "강북구") list = ["수유동","번동"];
  if (gu === "도봉구") list = ["쌍문동","창동"];
  if (gu === "성북구") list = ["길음동","정릉동"];
  if (gu === "노원구") list = ["상계동","중계동"];

  dong.innerHTML = list.map(d => `<option>${d}</option>`).join("");
}

function calculate() {

  const houseSize = document.getElementById("houseSize").value;
  const wall = document.getElementById("wall").value;
  const gu = document.getElementById("gu").value;
  const dong = document.getElementById("dong").value;

  if (!houseSize || !wall || !gu || !dong) {
    alert("모든 항목 선택");
    return;
  }

  let options = [];
  document.querySelectorAll('#optionBox input[type=checkbox]:checked')
    .forEach(el => options.push(el.value));

  const custom = document.getElementById("customOption").value;
  if (custom) options.push(custom);

  const price = wall === "합지" ? "50~70만원" : "80~120만원";

  document.getElementById("resultText").innerHTML =
    `${houseSize}<br>${wall}<br>${gu} ${dong}<br>${options.join(", ")}<br><br>예상견적: ${price}`;

  document.getElementById("resultBox").classList.remove("hidden");

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      type: houseSize,
      wall: wall,
      area: gu + " " + dong,
      option: options.join(", "),
      price: price
    })
  });

}

</script>

</body>
</html>
