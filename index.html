<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>간편 견적</title>

<style>
body {
  font-family: sans-serif;
  background:#f5f5f5;
  margin:0;
  text-align:center;
}

.wrap {
  max-width:500px;
  margin:0 auto;
  padding:20px;
}

h1 {
  font-size:26px;
  margin-bottom:10px;
}

.sub {
  font-size:14px;
  color:#666;
  margin-bottom:20px;
}

.box {
  background:#fff;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

select, input {
  width:100%;
  padding:12px;
  margin-top:10px;
  font-size:16px;
}

button {
  width:100%;
  padding:15px;
  margin-top:10px;
  font-size:16px;
  border:2px solid #000;
  background:#fff;
  cursor:pointer;
}

button.active {
  background:#000;
  color:#fff;
}

.result {
  font-size:24px;
  margin-top:20px;
  font-weight:bold;
}

.notice {
  font-size:13px;
  color:#555;
  margin-top:10px;
  line-height:1.5;
}
</style>
</head>

<body>

<div class="wrap">

<h1>도배 / 장판 / 필름 간편 견적</h1>
<div class="sub">1분 입력 → 예상금액 확인</div>

<!-- 주거형태 -->
<div class="box">
  <b>주거형태</b>
  <select id="housing">
    <option value="">선택</option>
    <option>주거 (아파트/빌라/원룸)</option>
    <option>상가 / 사무실</option>
  </select>
</div>

<!-- 평수 -->
<div class="box">
  <b>평수</b>
  <select id="size">
    <option value="">선택</option>
    <option>원룸 (5~10평)</option>
    <option>20평대</option>
    <option>30평대</option>
    <option>40평 이상</option>
  </select>
</div>

<!-- 벽지 -->
<div class="box">
  <b>벽지 선택</b>

  <button onclick="selectWallpaper(this, '합지')">
    합지 (가성비)<br>
    <small>단기 거주 / 월세, 전세 추천</small>
  </button>

  <button onclick="selectWallpaper(this, '실크')">
    실크 (고급 / 내구성 / 오염에 강함)<br>
    <small>오래 거주 시 적합</small>
  </button>
</div>

<!-- 추가 인테리어 -->
<div class="box">
  <b>추가 인테리어 (선택)</b>

  <div style="text-align:left; margin-top:10px;">
    <label><input type="checkbox"> 장판 시공</label><br>
    <label><input type="checkbox"> 필름 시공</label><br>
    <label><input type="checkbox"> 타일</label><br>
    <label><input type="checkbox"> 싱크대</label><br>
    <label><input type="checkbox"> 샷시</label>
  </div>

  <input type="text" placeholder="기타 요청사항 입력">

  <div class="notice">
    ※ 추가 인테리어는 견적에 포함되지 않습니다<br>
    ※ 별도 상담 후 진행됩니다
  </div>
</div>

<!-- 위치 -->
<div class="box">
  <b>시공 위치</b>
  <input type="text" placeholder="예: 수유동 / 쌍문동">
</div>

<!-- 버튼 -->
<button onclick="calc()">예상 견적 확인하기</button>

<div class="result" id="result"></div>

<div class="notice">
  ※ 현장 상태에 따라 변동될 수 있습니다
</div>

</div>

<script>

let wallpaper = "";

function selectWallpaper(btn, type){
  wallpaper = type;

  document.querySelectorAll("button").forEach(b=>{
    if(b.innerText.includes("합지") || b.innerText.includes("실크")){
      b.classList.remove("active");
    }
  });

  btn.classList.add("active");
}

function calc(){

  let size = document.getElementById("size").value;

  let price = "상담 필요";

  if(wallpaper === "합지"){
    if(size.includes("원룸")) price = "40 ~ 60만원";
    if(size.includes("20")) price = "80 ~ 110만원";
    if(size.includes("30")) price = "110 ~ 140만원";
  }

  if(wallpaper === "실크"){
    if(size.includes("원룸")) price = "60 ~ 80만원";
    if(size.includes("20")) price = "110 ~ 150만원";
    if(size.includes("30")) price = "150 ~ 200만원";
  }

  document.getElementById("result").innerText = price;
}

</script>

</body>
</html>
